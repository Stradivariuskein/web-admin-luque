
<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCEAN vibes by TemplateMo</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro&display=swap" rel="stylesheet"> <!-- https://fonts.google.com/ -->
    <link rel="stylesheet" href="fontawesome/css/all.min.css"> <!-- https://fontawesome.com/ -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'css/my_styles.css' %}">


    

</head>
<body>


    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <a class="navbar-brand" href="#">Luque</a>

        <div class="container"> <!-- Agrega un contenedor para centrar el contenido -->
            <div class="w-75 p-auto mx-auto"> <!-- Utiliza mx-auto para centrar horizontalmente -->

                <div class="input-group">
                    <input type="text" id="searchInput" class="form-control" placeholder="Buscar por nombre o códigos..." onkeyup="searchTable2()">
                </div>

            </div>
        </div>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse ml-auto text-right flex-g-0" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="#">Listas de precios</a>
                </li>
                <!--
                <li class="nav-item">
                    <a class="nav-link" href="#">Acerca de</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Servicios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contacto</a>
                </li>
                -->
            </ul>
        </div>
    </nav>
    

    <div class="container my-5">
        <div class="my-5 text-center">
            <h1>Buscar articulo</h1>
        </div>
        
            <div class="table-responsive">
                <table class="table table-striped table-bordered">
                    <thead>
                        <tr class="text-center">
                            <th>Codigo</th>
                            <th style="min-width: 25rem;">Descripcion</th>
                            <th >Precio mayorista</th>
                            <th>Precio minorista</th>
                            
                        </tr>
                    </thead>
                    <tbody>
                        
                        {% for art in artics %}
                        
                            <tr>
                                <td>{{art.code}}</td>
                                <td >{{art.description}}</td>
                                <td>{{art.priceMa}}</td>
                                <td>{{art.priceMi}}</td>

                            </tr>


                        {% endfor %}
                      
                    </tbody>
                </table>
            </div>

    </div>

    

    <footer class="tm-footer">
        <p>Echo por Alan Luque</p>
</footer>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="{%static 'js/script.js'%}"></script>
</body>
</html>
