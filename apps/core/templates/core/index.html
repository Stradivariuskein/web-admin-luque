
<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCEAN vibes by TemplateMo</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro&display=swap" rel="stylesheet"> <!-- https://fonts.google.com/ -->
    <link rel="stylesheet" href="fontawesome/css/all.min.css"> <!-- https://fontawesome.com/ -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'css/my_styles.css' %}">


    

</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <a class="navbar-brand" href="#">Luque</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#">Listas de precios</a>
                </li>
                <!--
                <li class="nav-item">
                    <a class="nav-link" href="#">Acerca de</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Servicios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contacto</a>
                </li>
                -->
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Actualizar lista de precios</h1>
        <form method="get" action="{% url 'udate-xlsx-step1' %}">
            {% csrf_token %}
            <div class="table-responsive">
                <table class="table table-striped table-bordered">
                    <thead>
                        <tr>
                            <th>Actualizar</th>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Ultima modificacion</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for xlsx in list_xlsx %}
                        <!--{% if xlsx %}-->
                            <tr>
                                <td>
                                    <input type="checkbox" name="lists_xlsx" value="{{xlsx}}">
                                </td>
                                <td>{{xlsx.id}}</td>
                                <td>{{xlsx.name}}</td>
                                <td>{{xlsx.modDate}}</td>
                            </tr>
                        <!--{% endif %}-->
                        {% endfor %}

                    </tbody>
                </table>
            </div>
            
            <div class="text-center navbar-expand-lg navbar-light bg-light fixed-bottom justify-content-center align-items-center d-flex hight-15">
                <button type="submit" class="btn btn-primary">Siguiente</button>
              </div>
        </form>
    </div>

    

    <footer class="tm-footer">
        <p>Echo por Alan Luque</p>
</footer>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
